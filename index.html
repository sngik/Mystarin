<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystarin | 오늘의 타로 리딩</title>
    <meta
      name="description"
      content="Mystarin에서 질문을 남기고 한 장의 타로 카드로 오늘의 메시지를 확인해 보세요."
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand-wrap">
        <h1 class="brand-title">Mystarin</h1>
        <p class="brand-subtitle">Mystery Arin</p>
      </div>
    </header>

    <main class="site-main">
      <section class="intro-section">
        <p class="intro-text">
          오늘의 질문을 남기고, 한 장의 카드로 지금 필요한 메시지를 확인해 보세요.
        </p>
      </section>

      <section class="question-section" aria-label="질문 입력">
        <label for="questionInput" class="input-label">질문 입력</label>
        <textarea
          id="questionInput"
          name="questionInput"
          rows="5"
          placeholder="궁금한 점이나 고민을 입력해 주세요."
        ></textarea>
        <div class="action-row">
          <button id="drawButton" type="button">카드 뽑기</button>
          <button id="resetButton" type="button">다시 시작</button>
        </div>
      </section>

      <section class="result-section" aria-label="결과 영역">
        <h2>결과</h2>
        <div id="resultArea" class="result-box">
          <p class="result-empty">카드를 뽑으면 이곳에 결과가 표시됩니다.</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Mystarin과 함께 오늘의 메시지를 만나보세요.</p>
    </footer>

    <script src="data/tarot.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
